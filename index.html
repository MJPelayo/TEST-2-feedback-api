<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form API</title>
    <style>
        /* Simple styling for the feedback form */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .form-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        
        .feedback-list {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        h2 {
            color: #764ba2;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .feedback-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .feedback-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .feedback-name {
            font-weight: bold;
            color: #667eea;
        }
        
        .feedback-email {
            color: #666;
            font-size: 0.9em;
        }
        
        .feedback-subject {
            font-weight: bold;
            color: #764ba2;
            margin: 10px 0;
        }
        
        .feedback-message {
            color: #333;
            margin: 10px 0;
            line-height: 1.5;
        }
        
        .feedback-date {
            color: #999;
            font-size: 0.8em;
            margin-top: 10px;
        }
        
        .refresh-btn {
            background: #28a745;
            margin-bottom: 20px;
        }
        
        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
        
        @media (max-width: 768px) {
            .form-card, .feedback-list {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Feedback Form Card -->
        <div class="form-card">
            <h1>📝 Feedback Form</h1>
            <p class="subtitle">We value your feedback! Please fill out the form below.</p>
            
            <form id="feedbackForm">
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="subject">Subject *</label>
                    <input type="text" id="subject" name="subject" placeholder="Enter subject" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" placeholder="Enter your message" required></textarea>
                </div>
                
                <button type="submit">Submit Feedback</button>
            </form>
            
            <div id="formMessage" class="message"></div>
        </div>
        
        <!-- Display All Feedback Card -->
        <div class="feedback-list">
            <h2>📋 All Feedback Entries</h2>
            <button onclick="loadFeedback()" class="refresh-btn">🔄 Refresh</button>
            <div id="feedbackContainer">
                <div class="loading">Click refresh to load feedback...</div>
            </div>
        </div>
    </div>
    
    <script>
        // API endpoint - change if running on different port/host
        const API_URL = 'http://localhost:8080';
        
        // Handle form submission
        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Get form data
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };
            
            const messageDiv = document.getElementById('formMessage');
            
            try {
                // Send POST request to API
                const response = await fetch(`${API_URL}/api/feedback`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Success
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ ' + data.message;
                    document.getElementById('feedbackForm').reset();
                    // Refresh the feedback list
                    loadFeedback();
                    
                    // Clear success message after 3 seconds
                    setTimeout(() => {
                        messageDiv.className = 'message';
                    }, 3000);
                } else {
                    // Error
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ Error: ' + data.error;
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Could not connect to server. Make sure the API is running on ' + API_URL;
            }
        });
        
        // Load and display all feedback
        async function loadFeedback() {
            const container = document.getElementById('feedbackContainer');
            container.innerHTML = '<div class="loading">Loading feedback...</div>';
            
            try {
                const response = await fetch(`${API_URL}/api/feedback/all`);
                const feedbacks = await response.json();
                
                if (feedbacks.length === 0) {
                    container.innerHTML = '<div class="loading">No feedback submitted yet. Be the first!</div>';
                    return;
                }
                
                // Display each feedback entry
                container.innerHTML = feedbacks.map(feedback => `
                    <div class="feedback-item">
                        <div class="feedback-header">
                            <span class="feedback-name">👤 ${escapeHtml(feedback.name)}</span>
                            <span class="feedback-email">📧 ${escapeHtml(feedback.email)}</span>
                        </div>
                        <div class="feedback-subject">📌 ${escapeHtml(feedback.subject)}</div>
                        <div class="feedback-message">${escapeHtml(feedback.message)}</div>
                        <div class="feedback-date">📅 ${new Date(feedback.created_at).toLocaleString()}</div>
                    </div>
                `).join('');
            } catch (error) {
                container.innerHTML = '<div class="loading">❌ Failed to load feedback. Make sure the server is running.</div>';
            }
        }
        
        // Helper function to prevent XSS attacks
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        // Load feedback when page loads
        loadFeedback();
    </script>
</body>
</html>
