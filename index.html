<!-- File: index.html -->
<!-- Purpose: Defines the structure of the feedback form web interface -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form API</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Feedback Form Card -->
        <div class="form-card">
            <h1>📝 Feedback Form</h1>
            <p class="subtitle">We value your feedback! Please fill out the form below.</p>
            
            <form id="feedbackForm">
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="subject">Subject *</label>
                    <input type="text" id="subject" name="subject" placeholder="Enter subject" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" placeholder="Enter your message" required></textarea>
                </div>
                
                <button type="submit">Submit Feedback</button>
            </form>
            
            <div id="formMessage" class="message"></div>
        </div>
        
        <!-- Display All Feedback Card -->
        <div class="feedback-list">
            <h2>📋 All Feedback Entries</h2>
            <button id="refreshBtn" class="refresh-btn">🔄 Refresh</button>
            <div id="feedbackContainer">
                <div class="loading">Click refresh to load feedback...</div>
            </div>
        </div>
    </div>
    
    <!-- Link to external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
